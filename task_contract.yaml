  - "path_exists:data/state/postflight.json"
required_artifacts:
  - "data/state/preflight.json"
  - "data/state/postflight.json"
stop_conditions:
  phi_threshold: 0.8
  breaker_open: true
  max_retries: 3
run_mode: "one_shot"
