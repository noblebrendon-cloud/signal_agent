scope: "domain:x"
pack_version: "1.0.0"
created_at: "2026-02-20T18:00:00Z"

boundary_conditions:
  max_word_count: 60
  max_claims: 1

disallowed_phrases:
  - "thread"
  - "1/"

allowed_output_classes: []
required_invariants: []

constraint_rules:
  - constraint_id: X_ALLOW_OFFLOAD
    rule_type: ALLOW
    trigger:
      capability_id: "content:text"
    predicate: {}
  - constraint_id: X_DENY_EXCESS_CLAIMS
    rule_type: DENY
    trigger:
      capability_id: "content:text"
    predicate:
      op: "GT"
      left: "snapshot.metrics.claims_count"
      right: 1
  - constraint_id: X_DENY_EXCESS_WORDS
    rule_type: DENY
    trigger:
      capability_id: "content:text"
    predicate:
      op: "GT"
      left: "snapshot.metrics.word_count"
      right: 60
  - constraint_id: X_DENY_EXCESS_HASHTAGS
    rule_type: DENY
    trigger:
      capability_id: "content:text"
    predicate:
      op: "MATCHES"
      left: "snapshot.content"
      right: "(?:#\\w+\\s*){3,}"
