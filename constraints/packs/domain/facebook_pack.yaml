scope: "domain:facebook"
pack_version: "1.0.0"
created_at: "2026-02-20T18:00:00Z"

boundary_conditions:
  max_word_count: 120
  max_claims: 3

disallowed_phrases:
  - "link in bio"

allowed_output_classes: []
required_invariants: []

constraint_rules:
  - constraint_id: FACEBOOK_ALLOW_OFFLOAD
    rule_type: ALLOW
    trigger:
      capability_id: "content:text"
    predicate: {}
  - constraint_id: FACEBOOK_DENY_EXCESS_CLAIMS
    rule_type: DENY
    trigger:
      capability_id: "content:text"
    predicate:
      op: "GT"
      left: "snapshot.metrics.claims_count"
      right: 3
  - constraint_id: FACEBOOK_DENY_EXCESS_WORDS
    rule_type: DENY
    trigger:
      capability_id: "content:text"
    predicate:
      op: "GT"
      left: "snapshot.metrics.word_count"
      right: 120
