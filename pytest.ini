[pytest]
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
testpaths = tests
norecursedirs = .git .venv __pycache__ .pytest_cache .tmp tmp artifacts outputs exports logs
addopts = --ignore-glob=test*.txt
filterwarnings =
    default
    error::DeprecationWarning:app\.agent
